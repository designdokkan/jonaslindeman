<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image to ASCII</title>
  <!-- Page-local styles for the ASCII test utility -->
  <style>
    body {
      background-color: #fff;
      color: #333;
      font-family: monospace;
      padding: 20px;
    }
    #ascii-output {
      white-space: pre;
      font-size: 8px;
      line-height: 6px;
    }
  </style>
</head>
<body>
<!-- Simple controls and output target -->
<h2>ASCII Art Generator (Completely Browser Based)</h2>
<input type="file" id="upload" accept="image/*"><br><br>
<pre id="ascii-output"></pre>
<!-- Browser-only ASCII conversion pipeline -->
<script>
  // Character ramp from light to dark symbols.
  const asciiChars = "?=)(/&%€#!-.:;,";

  // Map brightness to the closest symbol in the ramp.
  function closestChar(brightness) {
    const index = Math.round((brightness / 255) * (asciiChars.length - 1));
    return asciiChars[Math.max(0, Math.min(asciiChars.length - 1, index))];
  }

  // Return only the ramp index for error-diffusion quantization.
  function getCharIndex(brightness) {
    return Math.round((brightness / 255) * (asciiChars.length - 1));
  }

  // Load image, sample pixels on canvas, then render ASCII output.
  document.getElementById("upload").addEventListener("change", function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (event) {
      const img = new Image();
      img.onload = function () {
        const width = 350;
        const aspect = 0.55;
        const scale = width / img.width;
        const height = Math.floor(img.height * scale * aspect);
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        const imageData = ctx.getImageData(0, 0, width, height);
        const data = imageData.data;
        const gray = new Float32Array(width * height);

        // Convert source pixels to luminance values.
        for (let i = 0; i < gray.length; i++) {
          const r = data[i * 4];
          const g = data[i * 4 + 1];
          const b = data[i * 4 + 2];
          gray[i] = 0.299 * r + 0.587 * g + 0.114 * b;
        }

        // Apply Floyd-Steinberg diffusion for smoother character gradients.
        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            const i = y * width + x;
            const old = gray[i];
            const newVal = (getCharIndex(old) / (asciiChars.length - 1)) * 255;
            const err = old - newVal;
            gray[i] = newVal;
            if (x + 1 < width)
              gray[i + 1] += err * 7 / 16;
            if (y + 1 < height) {
              if (x > 0)
                gray[i + width - 1] += err * 3 / 16;
              gray[i + width] += err * 5 / 16;
              if (x + 1 < width)
                gray[i + width + 1] += err * 1 / 16;
            }
          }
        }

        // Build final ASCII text line by line.
        let ascii = "";
        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            const i = y * width + x;
            ascii += closestChar(gray[i]);
          }
          ascii += "\n";
        }
        document.getElementById("ascii-output").textContent = ascii;
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });
</script>
</body>
</html>
